name: Lean Action CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  lint-deps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: python3 scripts/lint_deps.py

  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
      - uses: leanprover/lean-action@v1
